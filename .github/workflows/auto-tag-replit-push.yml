# .github/workflows/auto-tag-replit-push.yml
name: Auto Tag Before Push Lands

on:
  push:
    branches:
      - '*-replit'
      - 'developer'

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag the commit before this push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BEFORE_SHA="${{ github.event.before }}"
          COMMIT_MSG=$(git log -1 --pretty=%s "$BEFORE_SHA" 2>/dev/null || git log -1 --pretty=%s)
          SLUG=$(echo "$COMMIT_MSG" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-40)
          TAG="stable-$(date +%Y%m%d-%H%M%S)-${SLUG}-before-push"
          git tag -a "$TAG" "$BEFORE_SHA" -m "State before push to ${{ github.ref_name }}: $COMMIT_MSG"
          git push origin "$TAG"