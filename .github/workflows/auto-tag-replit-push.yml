name: Auto Tag Before Push Lands

on:
  push:
    branches:
      - '*-replit'   # matches any client Replit branch, e.g. nevil-kristi-replit

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag the commit before this push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BEFORE_SHA="${{ github.event.before }}"
          TAG="stable-$(date +%Y%m%d-%H%M%S)-before-push"
          git tag -a "$TAG" "$BEFORE_SHA" -m "State before push to ${{ github.ref_name }}"
          git push origin "$TAG"
